{% extends "base.html" %}

{% block title %}Añadir Flashcards{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Añadir Nuevas Flashcards</h4>
                </div>
                
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="verb_id" class="form-label">Seleccionar verbo</label>
                            <select class="form-select" id="verb_id" name="verb_id" required>
                                <option value="">Elige un verbo...</option>
                                {% for verb in verbs %}
                                    {% if verb.id not in existing_ids %}
                                    <option value="{{ verb.id }}">
                                        {{ verb.infinitivo }} - {{ verb.categoria }}
                                    </option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-save me-2"></i>Añadir Flashcard
                        </button>
                    </form>
                    
                    <hr>
                    
                    <h5 class="mt-4">Verbos disponibles para añadir</h5>
                    <div class="row mt-3">
                        {% for verb in verbs %}
                            {% if verb.id not in existing_ids %}
                            <div class="col-md-4 mb-2">
                                <div class="card">
                                    <div class="card-body p-2">
                                        <strong>{{ verb.infinitivo }}</strong>
                                        <small class="d-block text-muted">{{ verb.categoria }}</small>
                                    </div>
                                </div>
                            </div>
                            {% endif %}
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
